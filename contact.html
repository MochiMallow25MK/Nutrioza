<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrioza - Contact Us</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="main-title">Contact Us 🌾</h1>
        
        <nav class="navbar">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About Us</a>
            <a href="roles-dashboard.html" class="nav-link">More</a>
        </nav>
        
        <div class="contact-container">
            <div class="contact-form-section">
                <h2>Any questions or remarks? Just write us a message!</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter a valid email address" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your Name" required>
                    </div>
                    <button type="submit" class="submit-btn">SUBMIT</button>
                </form>
            </div>
            
            <div class="contact-info-section">
                <div class="info-block">
                    <h3>ABOUT CLUB</h3>
                    <p>Running Guide Workouts</p>
                </div>
                <div class="info-block">
                    <h3>PHONE (LANDLINE)</h3>
                    <p>+ 912 3 567 8987</p>
                    <p>+ 912 5 252 3336</p>
                </div>
                <div class="info-block">
                    <h3>OUR OFFICE LOCATION</h3>
                    <p>The Interior Design Studio Company</p>
                    <p>The Courtyard, Al Quoz 1, Colorado, USA</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
